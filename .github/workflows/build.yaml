name: Build, Test and Push to ECR

on:
  push:
    paths:
      - '/app/**'
      - '/app/config.yaml'
      - '.github/workflows/**'




permissions:

  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4


    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume:  ${{ secrets.AWS_OIDC_ROLE }}
        aws-region: eu-west-2

    # Login to ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2


    # Set environment variables for unique Docker image name
    - name: Set environment variables
      run: |
        echo "REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_ENV
        echo "REPOSITORY=gatus" >> $GITHUB_ENV
        echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Build and Tag Container Image
    - name: Build container image (cache enabled)
      uses: docker/build-push-action@v5
      with:
        context: ./app
        load: true
        push: false
        tags: |
          ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.IMAGE_TAG }}
          ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:latest
        cache-from: type=gha
        cache-to:   type=gha,mode=max


    # Test the container image
    - name: Test container
      run: |
        echo "starting Gatus container"
        docker run -d --rm --name gatus-test -p 8080:8080 \
          "${{env.REGISTRY}}/${{env.REPOSITORY}}:${{env.IMAGE_TAG}}"

        echo "Waiting for Gatus to start."
        sleep 5

        echo "Running health check."
        curl -f http://localhost:8080/health || (echo "Healthcheck failed" && exit 1)

        echo "Stopping container..."
        docker stop gatus-test
   
    #Push the container image to ECR
    - name: Push docker image to Amazon ECR
      run: |
        docker push ${{env.REGISTRY}}/${{env.REPOSITORY}}:${{env.IMAGE_TAG}}
        docker push ${{env.REGISTRY}}/${{env.REPOSITORY}}:latest
